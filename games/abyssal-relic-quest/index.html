<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
    <meta name="description" content="Abyssal Relic Quest is an adventurous mobile-friendly ocean exploration game.">
    <title>Abyssal Relic Quest</title>
    <style>
      :root {
        --ink: #061418;
        --deep: #08252e;
        --blue: #145a67;
        --cyan: #7bd8d8;
        --gold: #e8b75d;
        --coral: #df6651;
        --foam: #f4f0df;
        --line: rgba(244, 240, 223, 0.18);
      }

      * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      html, body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: var(--ink);
        color: var(--foam);
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        overscroll-behavior: none;
      }
      body { position: fixed; inset: 0; }
      main {
        position: relative;
        width: 100vw;
        height: 100svh;
        min-height: 500px;
        overflow: hidden;
        background:
          linear-gradient(180deg, rgba(123, 216, 216, 0.16), transparent 30%),
          radial-gradient(circle at 50% 115%, rgba(232, 183, 93, 0.18), transparent 34%),
          var(--deep);
        touch-action: none;
      }
      canvas { display: block; width: 100%; height: 100%; touch-action: none; }
      .hud {
        position: absolute;
        z-index: 2;
        top: max(12px, env(safe-area-inset-top));
        left: 12px;
        right: 12px;
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        pointer-events: none;
      }
      .eyebrow {
        margin: 0 0 5px;
        color: rgba(244, 240, 223, 0.7);
        font-size: 10px;
        font-weight: 850;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      h1 {
        margin: 0;
        max-width: 260px;
        font-size: clamp(28px, 8vw, 44px);
        line-height: 0.92;
        letter-spacing: 0;
      }
      .meters {
        display: grid;
        grid-template-columns: repeat(2, minmax(66px, auto));
        gap: 6px;
      }
      .meter {
        min-width: 66px;
        padding: 8px 9px;
        border: 1px solid var(--line);
        background: rgba(6, 20, 24, 0.62);
        text-align: right;
        backdrop-filter: blur(12px);
      }
      .meter span {
        display: block;
        color: rgba(244, 240, 223, 0.68);
        font-size: 9px;
        font-weight: 850;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }
      .meter strong {
        display: block;
        margin-top: 2px;
        font-variant-numeric: tabular-nums;
        font-size: 20px;
        line-height: 1;
      }
      .message {
        position: absolute;
        z-index: 3;
        left: 16px;
        right: 16px;
        bottom: max(18px, env(safe-area-inset-bottom));
        display: grid;
        gap: 12px;
        padding: 16px;
        border: 1px solid var(--line);
        background: rgba(6, 20, 24, 0.82);
        backdrop-filter: blur(16px);
      }
      .message[hidden] { display: none; }
      .message p { margin: 0; color: rgba(244, 240, 223, 0.78); font-size: 14px; line-height: 1.42; }
      .actions { display: flex; gap: 8px; flex-wrap: wrap; }
      button, a {
        display: inline-flex;
        min-height: 42px;
        align-items: center;
        justify-content: center;
        padding: 10px 13px;
        border: 1px solid rgba(244, 240, 223, 0.32);
        border-radius: 3px;
        background: var(--gold);
        color: var(--ink);
        font: inherit;
        font-size: 14px;
        font-weight: 850;
        text-decoration: none;
      }
      a { background: transparent; color: var(--foam); }
      .sound {
        position: absolute;
        z-index: 4;
        right: 12px;
        bottom: max(12px, env(safe-area-inset-bottom));
        min-height: 38px;
        padding: 8px 11px;
        background: rgba(6, 20, 24, 0.62);
        color: var(--foam);
        backdrop-filter: blur(12px);
      }
    </style>
  </head>
  <body>
    <main>
      <canvas id="game" aria-label="Abyssal Relic Quest playfield"></canvas>
      <section class="hud" aria-label="Game status">
        <div>
          <p class="eyebrow">Ocean Adventure</p>
          <h1>Abyssal Relic Quest</h1>
        </div>
        <div class="meters">
          <div class="meter"><span>Relics</span><strong id="relics">0/5</strong></div>
          <div class="meter"><span>Oxygen</span><strong id="oxygen">100</strong></div>
          <div class="meter"><span>Hull</span><strong id="hull">100</strong></div>
          <div class="meter"><span>Depth</span><strong id="depth">0</strong></div>
        </div>
      </section>
      <section class="message" id="message">
        <p><strong>Explore the abyss.</strong> Drag or use arrows/WASD to swim. Tap or press Space to fire the harpoon. Collect five relics, open the trench gate, and defeat the leviathan.</p>
        <div class="actions">
          <button id="start" type="button">Start Quest</button>
          <a href="../../">Game Lab</a>
        </div>
      </section>
      <button class="sound" id="sound" type="button" aria-pressed="true">Sound On</button>
    </main>
    <script>
      (() => {
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");
        const relicsEl = document.getElementById("relics");
        const oxygenEl = document.getElementById("oxygen");
        const hullEl = document.getElementById("hull");
        const depthEl = document.getElementById("depth");
        const message = document.getElementById("message");
        const startButton = document.getElementById("start");
        const soundButton = document.getElementById("sound");

        const world = { w: 2600, h: 2200 };
        const keys = new Set();
        const state = {
          w: 0, h: 0, dpr: 1, playing: false, won: false, muted: false,
          camera: { x: 0, y: 0 },
          target: { x: 0, y: 0, active: false },
          player: { x: 240, y: 240, vx: 0, vy: 0, r: 19, hull: 100, oxygen: 100, cooldown: 0 },
          relics: [],
          enemies: [],
          shots: [],
          bubbles: [],
          pings: [],
          gate: { x: 2250, y: 1810, open: false },
          boss: { x: 2360, y: 1840, hp: 160, active: false, defeated: false, phase: 0 },
          time: 0,
          audio: null
        };

        function setupAudio() {
          if (state.muted) return;
          const AudioContext = window.AudioContext || window.webkitAudioContext;
          if (!AudioContext) return;
          state.audio ||= new AudioContext();
          if (state.audio.state === "suspended") state.audio.resume();
        }

        function tone(kind) {
          if (state.muted || !state.audio) return;
          const now = state.audio.currentTime;
          const osc = state.audio.createOscillator();
          const gain = state.audio.createGain();
          const map = {
            fire: [260, 150, 0.1, "square"],
            relic: [520, 880, 0.2, "sine"],
            hit: [130, 70, 0.16, "sawtooth"],
            gate: [180, 420, 0.45, "triangle"],
            win: [420, 920, 0.55, "sine"]
          }[kind] || [220, 110, 0.12, "sine"];
          osc.type = map[3];
          osc.frequency.setValueAtTime(map[0], now);
          osc.frequency.exponentialRampToValueAtTime(map[1], now + map[2]);
          gain.gain.setValueAtTime(0.001, now);
          gain.gain.exponentialRampToValueAtTime(0.14, now + 0.02);
          gain.gain.exponentialRampToValueAtTime(0.001, now + map[2]);
          osc.connect(gain);
          gain.connect(state.audio.destination);
          osc.start(now);
          osc.stop(now + map[2] + 0.03);
        }

        function resize() {
          const rect = canvas.parentElement.getBoundingClientRect();
          state.dpr = Math.min(window.devicePixelRatio || 1, 2);
          state.w = Math.floor(rect.width);
          state.h = Math.floor(rect.height);
          canvas.width = Math.floor(state.w * state.dpr);
          canvas.height = Math.floor(state.h * state.dpr);
          canvas.style.width = `${state.w}px`;
          canvas.style.height = `${state.h}px`;
          ctx.setTransform(state.dpr, 0, 0, state.dpr, 0, 0);
        }

        function reset() {
          setupAudio();
          state.playing = true;
          state.won = false;
          state.time = 0;
          state.player = { x: 240, y: 240, vx: 0, vy: 0, r: 19, hull: 100, oxygen: 100, cooldown: 0 };
          state.gate.open = false;
          state.boss = { x: 2360, y: 1840, hp: 160, active: false, defeated: false, phase: 0 };
          state.shots = [];
          state.bubbles = [];
          state.pings = [];
          state.relics = [
            { x: 560, y: 440, got: false },
            { x: 1120, y: 760, got: false },
            { x: 620, y: 1500, got: false },
            { x: 1680, y: 420, got: false },
            { x: 1940, y: 1260, got: false }
          ];
          state.enemies = [
            { x: 780, y: 630, r: 24, hp: 2, t: 0 },
            { x: 1320, y: 1040, r: 30, hp: 3, t: 1 },
            { x: 1760, y: 830, r: 26, hp: 3, t: 2 },
            { x: 2050, y: 1530, r: 34, hp: 4, t: 3 },
            { x: 980, y: 1770, r: 28, hp: 3, t: 4 }
          ];
          message.hidden = true;
          updateHud();
          tone("gate");
        }

        function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
        function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }
        function relicCount() { return state.relics.filter((r) => r.got).length; }
        function screenX(x) { return x - state.camera.x; }
        function screenY(y) { return y - state.camera.y; }

        function fireAt(x, y) {
          const p = state.player;
          if (!state.playing || p.cooldown > 0) return;
          const dx = x - p.x;
          const dy = y - p.y;
          const len = Math.max(1, Math.hypot(dx, dy));
          state.shots.push({ x: p.x, y: p.y, vx: dx / len * 620, vy: dy / len * 620, life: 0.72 });
          p.cooldown = 0.28;
          tone("fire");
        }

        function pointerWorld(event) {
          const rect = canvas.getBoundingClientRect();
          return { x: event.clientX - rect.left + state.camera.x, y: event.clientY - rect.top + state.camera.y };
        }

        function updateHud() {
          relicsEl.textContent = `${relicCount()}/5`;
          oxygenEl.textContent = String(Math.max(0, Math.round(state.player.oxygen)));
          hullEl.textContent = String(Math.max(0, Math.round(state.player.hull)));
          depthEl.textContent = String(Math.round(state.player.y / 10));
        }

        function end(text, won = false) {
          state.playing = false;
          state.won = won;
          message.hidden = false;
          message.querySelector("p").innerHTML = text;
          startButton.textContent = won ? "Quest Again" : "Try Again";
          tone(won ? "win" : "hit");
        }

        function movePlayer(dt) {
          const p = state.player;
          let ax = 0, ay = 0;
          if (keys.has("ArrowLeft") || keys.has("a")) ax -= 1;
          if (keys.has("ArrowRight") || keys.has("d")) ax += 1;
          if (keys.has("ArrowUp") || keys.has("w")) ay -= 1;
          if (keys.has("ArrowDown") || keys.has("s")) ay += 1;
          if (state.target.active) {
            const dx = state.target.x - p.x;
            const dy = state.target.y - p.y;
            const len = Math.hypot(dx, dy);
            if (len > 18) { ax += dx / len; ay += dy / len; }
          }
          const len = Math.hypot(ax, ay) || 1;
          p.vx += (ax / len) * 560 * dt;
          p.vy += (ay / len) * 560 * dt;
          p.vx *= 0.88;
          p.vy *= 0.88;
          p.x = clamp(p.x + p.vx * dt, 40, world.w - 40);
          p.y = clamp(p.y + p.vy * dt, 40, world.h - 40);
          p.cooldown = Math.max(0, p.cooldown - dt);
          p.oxygen -= dt * (p.y > 250 ? 4.6 : -18);
          p.oxygen = clamp(p.oxygen, 0, 100);
          if (p.oxygen <= 0) p.hull -= dt * 16;
        }

        function update(dt) {
          state.time += dt;
          if (!state.playing) return;
          movePlayer(dt);
          const p = state.player;
          state.camera.x = clamp(p.x - state.w * 0.5, 0, world.w - state.w);
          state.camera.y = clamp(p.y - state.h * 0.54, 0, world.h - state.h);

          if (Math.random() < dt * 10) state.bubbles.push({ x: p.x + (Math.random() - 0.5) * 36, y: p.y + 20, r: 2 + Math.random() * 4, life: 1 });
          state.bubbles.forEach((b) => { b.y -= dt * 48; b.life -= dt; });
          state.bubbles = state.bubbles.filter((b) => b.life > 0);
          state.pings.forEach((g) => g.life -= dt);
          state.pings = state.pings.filter((g) => g.life > 0);

          for (const relic of state.relics) {
            if (!relic.got && Math.hypot(relic.x - p.x, relic.y - p.y) < 42) {
              relic.got = true;
              state.pings.push({ x: relic.x, y: relic.y, life: 0.75, color: "#e8b75d" });
              tone("relic");
            }
          }
          if (relicCount() === 5 && !state.gate.open) {
            state.gate.open = true;
            state.pings.push({ x: state.gate.x, y: state.gate.y, life: 1.1, color: "#7bd8d8" });
            tone("gate");
          }
          if (state.gate.open && Math.hypot(p.x - state.gate.x, p.y - state.gate.y) < 190) state.boss.active = true;

          for (const enemy of state.enemies) {
            enemy.t += dt;
            const dx = p.x - enemy.x;
            const dy = p.y - enemy.y;
            const d = Math.hypot(dx, dy);
            if (d < 420) {
              enemy.x += dx / d * dt * 86;
              enemy.y += dy / d * dt * 86;
            } else {
              enemy.x += Math.cos(enemy.t) * dt * 26;
              enemy.y += Math.sin(enemy.t * 0.7) * dt * 22;
            }
            if (d < enemy.r + p.r) {
              p.hull -= dt * 26;
              p.vx -= dx / d * 120 * dt;
              p.vy -= dy / d * 120 * dt;
            }
          }
          state.enemies = state.enemies.filter((e) => e.hp > 0);

          if (state.boss.active && !state.boss.defeated) {
            const b = state.boss;
            b.phase += dt;
            const dx = p.x - b.x, dy = p.y - b.y, d = Math.hypot(dx, dy);
            b.x += dx / d * dt * (54 + Math.sin(b.phase * 2) * 20);
            b.y += dy / d * dt * 46;
            if (d < 82) p.hull -= dt * 34;
          }

          for (const shot of state.shots) {
            shot.x += shot.vx * dt; shot.y += shot.vy * dt; shot.life -= dt;
            for (const enemy of state.enemies) {
              if (Math.hypot(shot.x - enemy.x, shot.y - enemy.y) < enemy.r + 8) {
                enemy.hp -= 1; shot.life = 0; tone("hit");
                state.pings.push({ x: enemy.x, y: enemy.y, life: 0.35, color: "#df6651" });
              }
            }
            const b = state.boss;
            if (b.active && !b.defeated && Math.hypot(shot.x - b.x, shot.y - b.y) < 70) {
              b.hp -= 12; shot.life = 0; tone("hit");
              state.pings.push({ x: shot.x, y: shot.y, life: 0.4, color: "#df6651" });
              if (b.hp <= 0) {
                b.defeated = true;
                end("<strong>Leviathan defeated.</strong> You recovered the relic set and escaped the abyss.", true);
              }
            }
          }
          state.shots = state.shots.filter((s) => s.life > 0);
          if (p.hull <= 0) end("<strong>Sub hull breached.</strong> Surface, repair, and try the quest again.");
          updateHud();
        }

        function drawBackground() {
          const g = ctx.createLinearGradient(0, 0, 0, state.h);
          g.addColorStop(0, "#145a67");
          g.addColorStop(1, "#061418");
          ctx.fillStyle = g;
          ctx.fillRect(0, 0, state.w, state.h);
          ctx.strokeStyle = "rgba(244,240,223,.09)";
          ctx.lineWidth = 1;
          for (let x = -state.camera.x % 120; x < state.w; x += 120) {
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x - 40, state.h); ctx.stroke();
          }
          for (let y = -state.camera.y % 100; y < state.h; y += 100) {
            ctx.beginPath(); ctx.moveTo(0, y); ctx.quadraticCurveTo(state.w * 0.5, y + 16, state.w, y); ctx.stroke();
          }
        }

        function drawWorldObjects() {
          const caves = [
            [420, 320, 190, 90], [1060, 690, 250, 110], [540, 1450, 270, 130],
            [1600, 360, 260, 120], [1880, 1180, 320, 150], [2210, 1770, 300, 160]
          ];
          ctx.fillStyle = "rgba(3, 12, 15, 0.56)";
          ctx.strokeStyle = "rgba(123,216,216,.18)";
          for (const [x, y, w, h] of caves) {
            ctx.beginPath();
            ctx.ellipse(screenX(x), screenY(y), w, h, 0.1, 0, Math.PI * 2);
            ctx.fill(); ctx.stroke();
          }
          ctx.fillStyle = state.gate.open ? "rgba(123,216,216,.42)" : "rgba(223,102,81,.48)";
          ctx.fillRect(screenX(state.gate.x - 22), screenY(state.gate.y - 120), 44, 240);
          ctx.strokeStyle = "#e8b75d";
          ctx.strokeRect(screenX(state.gate.x - 28), screenY(state.gate.y - 126), 56, 252);
        }

        function drawPlayer() {
          const p = state.player;
          ctx.save();
          ctx.translate(screenX(p.x), screenY(p.y));
          ctx.rotate(Math.atan2(p.vy, p.vx || 1) * 0.25);
          ctx.fillStyle = "#f4f0df";
          ctx.beginPath();
          ctx.moveTo(26, 0); ctx.quadraticCurveTo(0, -20, -28, 0); ctx.quadraticCurveTo(0, 20, 26, 0); ctx.fill();
          ctx.fillStyle = "#7bd8d8"; ctx.fillRect(-10, -7, 18, 14);
          ctx.fillStyle = "#061418"; ctx.beginPath(); ctx.arc(10, -4, 3, 0, Math.PI * 2); ctx.fill();
          ctx.restore();
        }

        function draw() {
          drawBackground();
          drawWorldObjects();
          for (const relic of state.relics) if (!relic.got) {
            ctx.fillStyle = "#e8b75d";
            ctx.beginPath(); ctx.arc(screenX(relic.x), screenY(relic.y), 15 + Math.sin(state.time * 4) * 2, 0, Math.PI * 2); ctx.fill();
            ctx.strokeStyle = "#f4f0df"; ctx.stroke();
          }
          for (const enemy of state.enemies) {
            ctx.fillStyle = "#df6651";
            ctx.beginPath(); ctx.ellipse(screenX(enemy.x), screenY(enemy.y), enemy.r * 1.25, enemy.r, Math.sin(enemy.t) * 0.4, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = "#061418"; ctx.beginPath(); ctx.arc(screenX(enemy.x + enemy.r * 0.45), screenY(enemy.y - 4), 4, 0, Math.PI * 2); ctx.fill();
          }
          const b = state.boss;
          if (b.active && !b.defeated) {
            ctx.fillStyle = "#17363d";
            ctx.strokeStyle = "#df6651";
            ctx.lineWidth = 4;
            ctx.beginPath(); ctx.ellipse(screenX(b.x), screenY(b.y), 92, 58, Math.sin(b.phase) * 0.3, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
            ctx.fillStyle = "#df6651"; ctx.fillRect(screenX(b.x - 80), screenY(b.y - 86), Math.max(0, b.hp), 8);
          }
          ctx.fillStyle = "#f4f0df";
          for (const shot of state.shots) { ctx.beginPath(); ctx.arc(screenX(shot.x), screenY(shot.y), 5, 0, Math.PI * 2); ctx.fill(); }
          ctx.strokeStyle = "rgba(244,240,223,.5)";
          for (const bubble of state.bubbles) { ctx.beginPath(); ctx.arc(screenX(bubble.x), screenY(bubble.y), bubble.r, 0, Math.PI * 2); ctx.stroke(); }
          for (const ping of state.pings) {
            const a = ping.life / 0.75;
            ctx.strokeStyle = ping.color;
            ctx.globalAlpha = Math.max(0, a);
            ctx.lineWidth = 3;
            ctx.beginPath(); ctx.arc(screenX(ping.x), screenY(ping.y), 20 + (1 - a) * 70, 0, Math.PI * 2); ctx.stroke();
            ctx.globalAlpha = 1;
          }
          drawPlayer();
        }

        let last = performance.now();
        function frame(now) {
          const dt = Math.min(0.033, (now - last) / 1000);
          last = now;
          update(dt);
          draw();
          requestAnimationFrame(frame);
        }

        canvas.addEventListener("pointerdown", (event) => {
          event.preventDefault();
          setupAudio();
          if (!state.playing) { reset(); return; }
          const point = pointerWorld(event);
          state.target = { ...point, active: true };
          fireAt(point.x, point.y);
        });
        canvas.addEventListener("pointermove", (event) => {
          if (!state.playing) return;
          state.target = { ...pointerWorld(event), active: true };
        });
        window.addEventListener("pointerup", () => { state.target.active = false; });
        window.addEventListener("keydown", (event) => {
          keys.add(event.key);
          if (event.key === " ") fireAt(state.player.x + 180, state.player.y);
          if (event.key === "Enter" && !state.playing) reset();
        });
        window.addEventListener("keyup", (event) => keys.delete(event.key));
        startButton.addEventListener("click", reset);
        soundButton.addEventListener("click", () => {
          state.muted = !state.muted;
          soundButton.textContent = state.muted ? "Sound Off" : "Sound On";
          soundButton.setAttribute("aria-pressed", String(!state.muted));
          if (!state.muted) setupAudio();
        });
        window.addEventListener("resize", resize);
        resize();
        updateHud();
        requestAnimationFrame(frame);
      })();
    </script>
  </body>
</html>
